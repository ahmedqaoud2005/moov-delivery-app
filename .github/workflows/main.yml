name: Build APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract Project Files
        run: |
          unzip -o *.zip -d project_data
          TARGET_DIR=$(find project_data -name "package.json" -printf '%h' -quit)
          echo "PROJECT_ROOT=$TARGET_DIR" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install and Build Web
        run: |
          cd ${{ env.PROJECT_ROOT }}
          npm install --legacy-peer-deps
          npm install -D @tailwindcss/oxide-linux-x64-gnu
          npm run build

      - name: Build Android APK
        run: |
          cd ${{ env.PROJECT_ROOT }}
          # تثبيت أدوات الأندرويد اللازمة
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap add android || true
          npx cap copy
          npx cap sync
          cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Moov-Delivery-Final
          path: "**/android/app/build/outputs/apk/debug/app-debug.apk"
          
