name: Build Android APK (Capacitor)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Add Android Platform
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "Moov" "com.moov.delivery" --web-dir dist
          npx cap add android
          npx cap copy android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Ultimate Force Fix
        run: |
          # مسح الملفات المكررة يدوياً من ذاكرة السيرفر قبل البناء
          find /home/runner/.gradle/caches/ -name "kotlin-stdlib-jdk*.jar" -delete || true
          # حقن كود التجاهل مباشرة في ملف إعدادات الأندرويد
          FILE="android/app/build.gradle"
          sed -i '/android {/a \    packagingOptions {\n        resources {\n            pickFirst "META-INF/*.kotlin_module"\n            pickFirst "**/kotlin-stdlib-jdk8.kotlin_module"\n            pickFirst "**/kotlin-stdlib-jdk7.kotlin_module"\n            pickFirst "**/kotlin-stdlib.kotlin_module"\n            excludes += "/META-INF/{AL2.0,LGPL2.1}"\n        }\n    }' $FILE

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Moov-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
