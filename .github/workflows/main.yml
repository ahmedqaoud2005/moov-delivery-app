name: Build Android APK (Final Force)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Environment
        run: |
          npm install
          npm run build
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "Moov" "com.moov.delivery" --web-dir dist
          npx cap add android
          npx cap copy android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Absolute Fix for Gradle
        run: |
          FILE="android/app/build.gradle"
          # إضافة إعدادات التغاضي عن التكرار في ملف Gradle مباشرة
          sed -i '/android {/a \    packagingOptions {\n        resources {\n            pickFirst "**/*.kotlin_module"\n            pickFirst "**/*.jar"\n            pickFirst "META-INF/*"\n        }\n    }' $FILE
          # إجبار التوافقية بين المكتبات المتصارعة
          echo "configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.20' } }" >> android/app/build.gradle

      - name: Build APK (Ignore All Errors Strategy)
        run: |
          cd android
          chmod +x gradlew
          # تشغيل البناء مع أمر عدم التوقف عند أخطاء التكرار
          ./gradlew assembleDebug -x lint --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Moov-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
