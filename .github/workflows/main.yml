name: Build APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract Project Files
        run: |
          unzip -o *.zip -d project_data
          TARGET_DIR=$(find project_data -name "package.json" -printf '%h' -quit)
          echo "PROJECT_ROOT=$TARGET_DIR" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Clean and Install Dependencies
        run: |
          cd ${{ env.PROJECT_ROOT }}
          rm -rf node_modules package-lock.json
          npm install --legacy-peer-deps
          # هذه الخطوة هي المفتاح لحل خطأ Native Binding نهائياً
          npm install -D @tailwindcss/oxide-linux-x64-gnu 

      - name: Build Web Project
        run: |
          cd ${{ env.PROJECT_ROOT }}
          npm run build

      - name: Build Android
        run: |
          cd ${{ env.PROJECT_ROOT }}
          npx cap add android || true
          npx cap copy
          if [ -d "android" ]; then
            cd android && ./gradlew assembleDebug
          else
            echo "Android folder not found!"
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Moov-Delivery-Final
          path: "**/android/app/build/outputs/apk/debug/app-debug.apk"
          
