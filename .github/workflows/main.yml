name: Moov Clean Victory

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Capacitor Clean Setup
        run: |
          # تنظيف أي بقايا سابقة نهائياً
          rm -rf android node_modules package-lock.json
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # بناء المشروع من ملفاتك في مجلد pubilc
          npx cap init "Moov" "com.moov.delivery" --web-dir pubilc
          npx cap add android
          npx cap sync android

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Final Build Force
        run: |
          cd android
          # إجبار النظام على تجاهل تعارض المكتبات
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: Moov-Victory-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
