name: Build Android APK (Capacitor)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Environment Setup
        run: |
          npm install
          npm run build
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "Moov" "com.moov.delivery" --web-dir dist
          npx cap add android
          npx cap copy android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Atomic Fix for Kotlin Duplicate Classes
        run: |
          # تعديل ملف gradle ليتجاهل كل مشاكل التكرار نهائياً
          FILE="android/app/build.gradle"
          echo "configurations.all { resolutionStrategy.activateDependencyLocking() }" >> android/build.gradle
          sed -i '/android {/a \    packagingOptions {\n        resources {\n            pickFirst "**/*.kotlin_module"\n            pickFirst "**/*.jar"\n            pickFirst "META-INF/*"\n        }\n        merge "META-INF/*.kotlin_module"\n    }' $FILE

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
          
