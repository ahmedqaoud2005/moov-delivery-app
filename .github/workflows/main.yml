name: Build Moov Final Fix

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Sync Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # حذف أي مجلد أندرويد قديم لضمان بناء نظيف
          rm -rf android
          # إنشاء الإعدادات وربط الملفات (استخدمنا النقطة لأن index.html بره)
          npx cap init "Moov" "com.moov.delivery" --web-dir .
          npx cap add android
          # هذا السطر هو اللي بيحل مشكلة الملف المفقود في صورتك
          npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -x lint --no-daemon

      - name: Upload Moov APK
        uses: actions/upload-artifact@v4
        with:
          name: Moov-Fixed-Version
          path: android/app/build/outputs/apk/debug/app-debug.apk
