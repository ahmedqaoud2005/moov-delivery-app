name: Build APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # تم التحديث لـ v4

      - name: Extract Files
        run: unzip -o *.zip -d .

      - name: Setup Node
        uses: actions/setup-node@v4 # تم التحديث لـ v4
        with:
          node-version: 18

      - name: Install and Build
        run: |
          npm install
          npm run build

      - name: Build Android
        run: |
          npx cap add android || true
          npx cap copy
          cd android && ./gradlew assembleDebug

      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # هذا هو الإصدار المطلوب لحل المشكلة
        with:
          name: Moov-App-Package
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
