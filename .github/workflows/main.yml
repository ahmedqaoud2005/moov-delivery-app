name: Moov Final Success Artan

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Capacitor Setup
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          rm -rf android
          npx cap init "Moov" "com.moov.delivery" --web-dir pubilc
          npx cap add android
          npx cap sync android

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build APK Without Conflicts
        run: |
          cd android
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          # حل مشكلة التكرار (Duplicate Class) بطريقة مباشرة للسيرفر
          echo "android.nonTransitiveRClass=true" >> gradle.properties
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Moov-App-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
