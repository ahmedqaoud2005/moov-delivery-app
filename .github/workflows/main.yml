name: Build APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract Project Files
        run: |
          unzip -o *.zip -d project_data
          TARGET_DIR=$(find project_data -name "package.json" -printf '%h' -quit)
          echo "PROJECT_ROOT=$TARGET_DIR" >> $GITHUB_ENV

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install and Build Web
        run: |
          cd ${{ env.PROJECT_ROOT }}
          npm install --legacy-peer-deps
          npm install -D @tailwindcss/oxide-linux-x64-gnu
          npm run build
          mkdir -p www && cp -r dist/* www/ 2>/dev/null || cp -r build/* www/ 2>/dev/null || true

      - name: Build Android APK
        run: |
          cd ${{ env.PROJECT_ROOT }}
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "MoovDelivery" "com.moov.delivery" --web-dir www || true
          npx cap add android || true
          npx cap sync
          cd android
          # زيادة ذاكرة الجافا وتنظيف الذاكرة المؤقتة (حل مشكلة الصور الأخيرة)
          export _JAVA_OPTIONS="-Xmx2048m"
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Moov-Delivery-Final
          path: "**/android/app/build/outputs/apk/debug/app-debug.apk"
          
