name: Moov Final Force Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Capacitor Setup
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          rm -rf android
          npx cap init "Moov" "com.moov.delivery" --web-dir pubilc
          npx cap add android
          npx cap sync android

      - uses: actions/setup-java@v4
        with:
          java-version: '17' # غيرناها لنسخة أكثر استقراراً مع Capacitor
          distribution: 'temurin'

      - name: Force Build Without Conflicts
        run: |
          cd android
          # إجبار المشروع على استخدام AndroidX وحل تعارض Kotlin
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "kotlin.code.style=official" >> gradle.properties
          chmod +x gradlew
          # أمر بناء ينظف ويجبر النسخ على التوافق
          ./gradlew clean assembleDebug --no-daemon -Dorg.gradle.jvmargs="-Xmx2048m"

      - uses: actions/upload-artifact@v4
        with:
          name: Moov-Final-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
