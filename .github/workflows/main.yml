name: Moov Victory Final

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Sync Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # مسح أي بناء قديم لضمان النظافة
          rm -rf android
          # التعديل المهم جداً: القراءة من مجلد public
          npx cap init "Moov" "com.moov.delivery" --web-dir public
          npx cap add android
          npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build APK Final
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Moov-Final-Winner
          path: android/app/build/outputs/apk/debug/app-debug.apk
