name: Moov Final Success

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Capacitor Setup
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          rm -rf android
          npx cap init "Moov" "com.moov.delivery" --web-dir pubilc
          npx cap add android
          npx cap sync android

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Force Fix Duplicate Classes
        run: |
          cd android
          # السطرين هدول هما الحل النهائي لمشكلة الصورة
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "constraints { implementation(\"org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22\") { because(\"kotlin-stdlib-jdk8 is now part of kotlin-stdlib\") } }" >> app/build.gradle
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Moov-Original-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
