name: Build Android APK (Final Project Files)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build # تأكد أن هذا الأمر ينتج مجلد dist أو www

      - name: Capacitor Android Sync
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          # إذا كانت ملفاتك في مجلد غير dist، غير الاسم هنا
          npx cap init "Moov" "com.moov.delivery" --web-dir dist 
          npx cap add android
          npx cap copy android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Absolute Fix for Gradle
        run: |
          FILE="android/app/build.gradle"
          sed -i '/android {/a \    packagingOptions {\n        resources {\n            pickFirst "**/*.kotlin_module"\n            pickFirst "**/*.jar"\n            pickFirst "META-INF/*"\n        }\n    }' $FILE
          echo "configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.20' } }" >> android/app/build.gradle

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -x lint --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Moov-App-Real
          path: android/app/build/outputs/apk/debug/app-debug.apk
