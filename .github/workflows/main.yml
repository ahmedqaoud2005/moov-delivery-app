name: Build Android APK (Capacitor)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Add Android Platform
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "Moov" "com.moov.delivery" --web-dir dist
          npx cap add android
          npx cap copy android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Delete Duplicate Kotlin Files
        run: |
          # حذف الملفات المسببة للتعارض يدوياً من مجلدات النظام
          find /home/runner/.m2/repository -name "kotlin-stdlib-jdk*.jar" -delete || true
          find /home/runner/.gradle/caches -name "kotlin-stdlib-jdk*.jar" -delete || true

      - name: Build APK (The Ultimate Force)
        run: |
          cd android
          chmod +x gradlew
          # إجبار Gradle على تجاهل التكرار في ملف الإعدادات ودمج الملفات
          ./gradlew assembleDebug -Pandroid.packageOptions.pickFirsts="**/*.kotlin_module" -Pandroid.packageOptions.excludes="META-INF/*.kotlin_module"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Moov-App
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
