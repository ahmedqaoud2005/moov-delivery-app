name: Build APK
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract and Move Files
        run: |
          unzip -o *.zip -d temp_folder
          find temp_folder -maxdepth 2 -name "package.json" -exec dirname {} \; | xargs -I {} mv {}/* . || true
          rm -rf temp_folder

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps || npm install --force

      - name: Build Web Project
        run: npm run build --if-present

      - name: Build Android
        run: |
          npx cap add android || true
          npx cap copy
          if [ -d "android" ]; then
            cd android && ./gradlew assembleDebug
          else
            echo "Android folder not found, skipping Gradle build."
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Moov-Delivery-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
          
